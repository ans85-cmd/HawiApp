<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login - HawiApp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0a0612;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:rgba(24,18,36,0.9);
  padding:25px;
  border-radius:16px;
  width:90%;
  max-width:380px;
}

input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  background:#ff2a4b;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">

  <button onclick="login()">Login</button>
</div>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

/* =========================
   SUPABASE INIT
========================= */

const supabaseClient = supabase.createClient(
  "https://hyervxfeoxojlqlgasvn.supabase.co",
  "sb_publishable_skyTnFKezDqaz53FD8pTTQ_fpvSTSLi"
);

/* =========================
   LOGIN FUNCTION
========================= */

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  console.log("LOGIN SUCCESS:", data);

  // WICHTIG: Session sauber prüfen statt Timeout
  const { data: sessionData } = await supabaseClient.auth.getSession();

  if (!sessionData.session) {
    alert("Session konnte nicht geladen werden");
    return;
  }

  // Redirect erst wenn Session wirklich existiert
  window.location.href = "index.html";
}

</script>

</body>
</html>
