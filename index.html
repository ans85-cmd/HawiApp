<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HawiApp Feed</title>

<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>

/* =========================
   RESET
========================= */

html, body {
  height: 100%;
  margin: 0;
  font-family: sans-serif;
  background: #0a0612;
  color: white;
}

/* =========================
   BACKGROUND (CYBER ALPEN)
========================= */

body::before {
  content:"";
  position: fixed;
  inset: 0;
  background: url("watermarked_img_12867647719775911672.png") center/cover no-repeat;
  opacity: 0.18;
  z-index: -2;
}

body::after {
  content:"";
  position: fixed;
  inset: 0;
  background: rgba(10,6,18,0.55);
  z-index: -1;
}

/* =========================
   APP LAYOUT FIX
========================= */

.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* =========================
   HEADER
========================= */

header {
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(10,6,18,0.75);
  backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.08);
}

header img {
  height: 38px;
}

/* =========================
   FEED (FIXED FLEX)
========================= */

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.post {
  background: rgba(24,18,36,0.70);
  backdrop-filter: blur(12px);

  padding: 12px;
  margin-bottom: 10px;
  border-radius: 14px;

  border: 1px solid rgba(255,255,255,0.08);
}

/* =========================
   WHATSAPP INPUT (100% FIX)
========================= */

#composer {
  display: flex;
  align-items: center;
  gap: 8px;

  padding: 10px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));

  background: rgba(10,6,18,0.92);
  backdrop-filter: blur(14px);

  border-top: 1px solid rgba(255,255,255,0.1);
}

/* TEXTAREA FIX (NO RESIZE BUG) */
#postContent {
  flex: 1;
  height: 42px;

  resize: none;
  overflow: hidden;

  border: none;
  outline: none;

  border-radius: 22px;
  padding: 10px 14px;

  font-size: 14px;

  background: rgba(255,255,255,0.08);
  color: white;
}

/* SEND BUTTON FIX (NO CUT OFF EVER) */
#composer button {
  width: 46px;
  height: 46px;
  flex-shrink: 0;

  border-radius: 50%;
  border: none;

  background: #ff2a4b;
  color: white;
  font-size: 18px;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* =========================
   MOBILE SAFETY FIX
========================= */

@supports (-webkit-touch-callout: none) {
  #composer {
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
}

</style>
</head>

<body>

<div class="app">

<header>
  <img src="banner_logo.PNG" alt="HawiApp">
</header>

<div id="feed"></div>

<div id="composer">
  <textarea id="postContent" placeholder="Nachricht schreiben..."></textarea>
  <button onclick="createPost()">➤</button>
</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
  "https://hyervxfeoxojlqlgasvn.supabase.co",
  "sb_publishable_skyTnFKezDqaz53FD8pTTQ_fpvSTSLi"
);

/* =========================
   SESSION CHECK
========================= */

async function checkSession() {
  const { data: { session } } =
    await supabaseClient.auth.getSession();

  if (!session || !session.user) {
    window.location.href = "login.html";
    return;
  }

  loadPosts();
}

checkSession();

/* =========================
   CREATE POST
========================= */

async function createPost() {

  const content = document.getElementById("postContent").value;

  if (!content.trim()) return;

  const { data: { session } } =
    await supabaseClient.auth.getSession();

  const { error } = await supabaseClient
    .from("posts")
    .insert([
      {
        content,
        user_id: session.user.id
      }
    ]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("postContent").value = "";
  loadPosts();
}

/* =========================
   LOAD POSTS
========================= */

async function loadPosts() {

  const { data } = await supabaseClient
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  (data || []).forEach(post => {
    feed.innerHTML += `
      <div class="post">
        <b>User</b>
        <p>${post.content}</p>
        <small style="opacity:0.6">
          ${new Date(post.created_at).toLocaleString()}
        </small>
      </div>
    `;
  });
}

</script>

</body>
</html>
