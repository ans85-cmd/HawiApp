<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HawiApp Feed</title>

<!-- MANIFEST FIX -->
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   GLOBAL FIX (IMPORTANT)
========================= */

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden; /* verhindert page shift */
  font-family: sans-serif;
  background: #0a0612;
  color: white;
}

/* =========================
   BACKGROUND
========================= */

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url("watermarked_img_12867647719775911672.png") center/cover no-repeat;
  opacity:0.15;
  z-index:-1;
}

/* =========================
   HEADER
========================= */

header {
  position: sticky;
  top: 0;
  background: rgba(10,6,18,0.9);
  backdrop-filter: blur(10px);
  padding: 10px;
  display:flex;
  justify-content:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

header img {
  height: 38px;
}

/* =========================
   FEED
========================= */

#feed {
  position: absolute;
  top: 60px;
  bottom: 70px; /* Platz für Input */
  left: 0;
  right: 0;
  overflow-y: auto;
  padding: 12px;
}

.post {
  background: rgba(24,18,36,0.75);
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 12px;
  backdrop-filter: blur(8px);
}

/* =========================
   WHATSAPP INPUT FIX
========================= */

#composer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  display: flex;
  align-items: center;
  gap: 8px;

  padding: 8px;
  background: rgba(10,6,18,0.95);
  border-top: 1px solid rgba(255,255,255,0.1);

  z-index: 100;
}

/* WICHTIG: verhindert "großziehen" */
#postContent {
  flex: 1;
  height: 42px;
  max-height: 42px;
  min-height: 42px;

  resize: none;
  overflow: hidden;

  border-radius: 20px;
  padding: 10px 12px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* Send Button fix */
#composer button {
  width: 46px;
  height: 46px;

  border-radius: 50%;
  border: none;

  background: #ff2a4b;
  color: white;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}

/* mobile keyboard fix */
@supports (-webkit-touch-callout: none) {
  #composer {
    padding-bottom: env(safe-area-inset-bottom);
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="banner_logo.PNG" alt="HawiApp">
</header>

<!-- FEED -->
<div id="feed"></div>

<!-- INPUT -->
<div id="composer">
  <textarea id="postContent" placeholder="Nachricht schreiben..."></textarea>
  <button onclick="createPost()">➤</button>
</div>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
  "https://hyervxfeoxojlqlgasvn.supabase.co",
  "sb_publishable_skyTnFKezDqaz53FD8pTTQ_fpvSTSLi"
);

/* =========================
   SESSION CHECK
========================= */

async function checkSession() {

  const { data: { session } } =
    await supabaseClient.auth.getSession();

  if (!session || !session.user) {
    window.location.href = "login.html";
    return;
  }

  loadPosts();
}

checkSession();

/* =========================
   CREATE POST
========================= */

async function createPost() {

  const content = document.getElementById("postContent").value;

  if (!content.trim()) return;

  const { data: { session } } =
    await supabaseClient.auth.getSession();

  const { error } = await supabaseClient
    .from("posts")
    .insert([
      {
        content,
        user_id: session.user.id
      }
    ]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("postContent").value = "";

  loadPosts();
}

/* =========================
   LOAD POSTS
========================= */

async function loadPosts() {

  const { data, error } = await supabaseClient
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  (data || []).forEach(post => {
    feed.innerHTML += `
      <div class="post">
        <b>User</b>
        <p>${post.content}</p>
        <small style="opacity:0.6">
          ${new Date(post.created_at).toLocaleString()}
        </small>
      </div>
    `;
  });
}

</script>

</body>
</html>
