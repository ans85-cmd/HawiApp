<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HawiApp Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0a0612;
  color:white;
}

header {
  padding:15px;
  text-align:center;
  border-bottom:1px solid #333;
}

#composer {
  padding:15px;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  height:80px;
  resize:none;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#ff2a4b;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.post {
  background:rgba(24,18,36,0.8);
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  🚀 HawiApp Feed
</header>

<!-- POST CREATOR -->
<div id="composer">
  <textarea id="postContent" placeholder="Was geht?"></textarea>
  <button onclick="createPost()">Posten</button>
</div>

<!-- FEED -->
<div id="feed"></div>

<button onclick="logout()">Logout</button>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

/* =========================
   SUPABASE INIT
========================= */

const supabaseClient = supabase.createClient(
  "https://hyervxfeoxojlqlgasvn.supabase.co",
  "sb_publishable_skyTnFKezDqaz53FD8pTTQ_fpvSTSLi"
);

/* =========================
   SESSION CHECK
========================= */

async function checkSession() {

  const { data: { session } } =
    await supabaseClient.auth.getSession();

  console.log("SESSION:", session);

  if (!session || !session.user) {
    window.location.href = "login.html";
    return;
  }

  loadPosts();
}

checkSession();

/* =========================
   POST ERSTELLEN
========================= */

async function createPost() {

  const content = document.getElementById("postContent").value;

  if (!content) return;

  const { data: { session } } =
    await supabaseClient.auth.getSession();

  const user = session.user;

  const { error } = await supabaseClient
    .from("posts")
    .insert([
      {
        content: content,
        user_id: user.id
      }
    ]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("postContent").value = "";

  loadPosts();
}

/* =========================
   POSTS LADEN
========================= */

async function loadPosts() {

  const { data, error } = await supabaseClient
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  (data || []).forEach(post => {

    feed.innerHTML += `
      <div class="post">
        <b>User</b>
        <p>${post.content}</p>
        <small>${new Date(post.created_at).toLocaleString()}</small>
      </div>
    `;
  });
}

/* =========================
   LOGOUT
========================= */

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

</script>

</body>
</html>
