<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HawiApp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   GLOBAL DESIGN
========================= */

:root {
  --bg-dark: #0a0612;
  --card: rgba(24,18,36,0.75);
  --accent: #ff2a4b;
  --text: #fff;
  --muted: #aaa;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body {
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* =========================
   BACKGROUND IMAGE
========================= */

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url("watermarked_img_12867647719775911672.png") center/cover no-repeat;
  opacity:0.15;
  z-index:-1;
}

/* =========================
   HEADER
========================= */

header {
  position:sticky;
  top:0;
  background:rgba(10,6,18,0.9);
  backdrop-filter: blur(10px);
  padding:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

header img {
  height:40px;
  object-fit:contain;
}

/* =========================
   FEED
========================= */

#feed {
  padding: 15px;
  padding-bottom: 120px; /* Platz für Input */
}

.post {
  background: var(--card);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
  backdrop-filter: blur(8px);
}

/* =========================
   WHATSAPP INPUT
========================= */

#composer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  gap: 8px;
  padding: 10px;
  background: rgba(10,6,18,0.95);
  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 10;
}

#composer textarea {
  flex:1;
  height: 42px;
  resize:none;
  border-radius: 20px;
  padding: 10px 12px;
  border:none;
  outline:none;
}

#composer button {
  width: 48px;
  border-radius: 50%;
  border:none;
  background: var(--accent);
  color:white;
  font-size:18px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER LOGO -->
<header>
  <img src="banner_logo.PNG" alt="HawiApp">
</header>

<!-- FEED -->
<div id="feed"></div>

<!-- WHATSAPP INPUT -->
<div id="composer">
  <textarea id="postContent" placeholder="Nachricht schreiben..."></textarea>
  <button onclick="createPost()">➤</button>
</div>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
  "https://hyervxfeoxojlqlgasvn.supabase.co",
  "sb_publishable_skyTnFKezDqaz53FD8pTTQ_fpvSTSLi"
);

/* =========================
   SESSION CHECK
========================= */

async function checkSession() {

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session || !session.user) {
    window.location.href = "login.html";
    return;
  }

  loadPosts();
}

checkSession();

/* =========================
   POST ERSTELLEN
========================= */

async function createPost() {

  const content = document.getElementById("postContent").value;

  if (!content.trim()) return;

  const { data: { session } } = await supabaseClient.auth.getSession();

  const { error } = await supabaseClient
    .from("posts")
    .insert([
      {
        content: content,
        user_id: session.user.id
      }
    ]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("postContent").value = "";

  loadPosts();
}

/* =========================
   POSTS LADEN
========================= */

async function loadPosts() {

  const { data, error } = await supabaseClient
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  (data || []).forEach(post => {

    feed.innerHTML += `
      <div class="post">
        <b>User</b>
        <p>${post.content}</p>
        <small style="opacity:0.6">
          ${new Date(post.created_at).toLocaleString()}
        </small>
      </div>
    `;
  });
}

</script>

</body>
</html>
