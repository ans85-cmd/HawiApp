<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HawiApp Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0a0612;
  color:white;
}

header {
  padding:15px;
  text-align:center;
  border-bottom:1px solid #333;
}

.post {
  background:rgba(24,18,36,0.8);
  margin:10px;
  padding:10px;
  border-radius:10px;
}

button {
  margin:10px;
  padding:10px;
  background:#ff2a4b;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  🚀 HawiApp Feed
</header>

<div id="feed"></div>

<button onclick="logout()">Logout</button>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

/* =========================
   SUPABASE INIT
========================= */

const supabaseClient = supabase.createClient(
  "https://hyervxfeoxojlqlgasvn.supabase.co",
  "sb_publishable_skyTnFKezDqaz53FD8pTTQ_fpvSTSLi"
);

/* =========================
   STABILE SESSION PRÜFUNG
========================= */

async function checkSession() {

  try {

    const { data: { session }, error } =
      await supabaseClient.auth.getSession();

    console.log("SESSION CHECK:", session);

    if (error) {
      console.error("SESSION ERROR:", error);
      window.location.href = "login.html";
      return;
    }

    if (!session || !session.user) {
      console.log("NO SESSION → redirect login");
      window.location.href = "login.html";
      return;
    }

    console.log("LOGGED IN AS:", session.user.email);

    loadPosts();

  } catch (err) {
    console.error("CHECK SESSION FAILED:", err);
    window.location.href = "login.html";
  }
}

checkSession();

/* =========================
   REALTIME AUTH LISTENER
========================= */

supabaseClient.auth.onAuthStateChange((event, session) => {
  console.log("AUTH EVENT:", event);

  if (event === "SIGNED_OUT") {
    window.location.href = "login.html";
  }
});

/* =========================
   POSTS LADEN
========================= */

async function loadPosts() {

  const { data, error } = await supabaseClient
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("POST ERROR:", error);
    return;
  }

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  (data || []).forEach(p => {
    feed.innerHTML += `
      <div class="post">
        <b>${p.profiles?.username || "unknown"}</b>
        <p>${p.content || ""}</p>
      </div>
    `;
  });
}

/* =========================
   LOGOUT
========================= */

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

</script>

</body>
</html>
